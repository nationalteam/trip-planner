name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure branch ref
        run: |
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "This workflow supports branch refs only (received: ${GITHUB_REF_TYPE:-unknown})."
            exit 1
          fi

      - name: Bump version without creating tag
        run: |
          ./scripts/bump-version.sh "${{ inputs.bump }}" --no-tag

      - name: Read bumped version
        id: version
        run: |
          next_version="$(node -p "require('./package.json').version")"
          echo "next_version=${next_version}" >> "$GITHUB_OUTPUT"

      - name: Create release bump pull request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_TOKEN != '' && secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: "chore(release): bump version to ${{ steps.version.outputs.next_version }}"
          title: "chore(release): bump version to ${{ steps.version.outputs.next_version }}"
          body: |
            Automated version bump PR.

            - bump type: `${{ inputs.bump }}`
            - target branch: `main`
          branch: chore/release/bump-version-${{ steps.version.outputs.next_version }}
          base: main
          delete-branch: true
          add-paths: |
            package.json
            package-lock.json

      - name: Show pull request result
        if: ${{ steps.cpr.outputs.pull-request-url != '' }}
        run: |
          echo "Created PR: ${{ steps.cpr.outputs.pull-request-url }}" >> "$GITHUB_STEP_SUMMARY"
