name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify GitHub token access
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const currentRef = process.env.GITHUB_REF_NAME;
            if (!currentRef) {
              core.setFailed('GITHUB_REF_NAME is not available.');
              return;
            }
            await github.rest.repos.getBranch({
              owner,
              repo,
              branch: currentRef,
            });
            core.info(`Validated access to ${owner}/${repo}@${currentRef}`);

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain)" ]; then
            echo "Working tree is not clean before version bump."
            git --no-pager status --short
            exit 1
          fi
          npm version "${{ inputs.bump }}" -m "chore(release): bump version to %s"

      - name: Push commit and tags
        run: |
          set -euo pipefail
          git push origin "HEAD:${GITHUB_REF_NAME}" --follow-tags
