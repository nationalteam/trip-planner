name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify GitHub token access
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const refType = process.env.GITHUB_REF_TYPE;
            const currentRef = process.env.GITHUB_REF_NAME;
            if (refType !== 'branch') {
              core.setFailed(`This workflow supports branch refs only (received: ${refType ?? 'unknown'}).`);
              return;
            }
            if (!currentRef) {
              core.setFailed('GITHUB_REF_NAME is not available.');
              return;
            }
            await github.rest.repos.getBranch({
              owner,
              repo,
              branch: currentRef,
            });
            core.info(`Validated access to ${owner}/${repo}@${currentRef}`);

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: |
          ./scripts/bump-version.sh "${{ inputs.bump }}"

      - name: Push commit and tags
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" != "branch" ]; then
            echo "This workflow supports branch refs only (received: ${GITHUB_REF_TYPE:-unknown})."
            exit 1
          fi
          git push "https://x-access-token:${PAT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${GITHUB_REF_NAME}" --follow-tags
