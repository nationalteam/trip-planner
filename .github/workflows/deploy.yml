name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare environment file
        env:
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          DATABASE_URL: ${{ vars.DATABASE_URL }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          install -m 600 /dev/null .env
          {
            echo "BIFROST_BASE_URL=${{ secrets.BIFROST_BASE_URL }}"
            echo "OPENAI_MODEL=${OPENAI_MODEL:-gpt-5-mini}"
            echo "DATABASE_URL=${DATABASE_URL:-file:/app/data/prod.db}"
            echo "GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}"
          } >> .env

      - name: Deploy with Docker Compose
        run: |
          docker compose down --remove-orphans
          docker compose up -d --build

      # - name: Remove environment file
      #   if: always()
      #   run: rm -f .env
