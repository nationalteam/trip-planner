name: Tag Release On Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  tag-on-merge:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch with tags
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag if missing
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          TAG_NAME="v${VERSION}"

          if git rev-parse --verify --quiet "refs/tags/${TAG_NAME}" >/dev/null; then
            echo "Tag ${TAG_NAME} already exists; skipping."
            echo "Tag ${TAG_NAME} already exists; skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git tag -a "${TAG_NAME}" -m "chore(release): ${TAG_NAME}"
          git push origin "${TAG_NAME}"
          echo "Created tag ${TAG_NAME}." >> "$GITHUB_STEP_SUMMARY"
