<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trip Planner Preview</title>
    <style>
      :root { color-scheme: light dark; }
      body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; }
      .wrap { max-width: 760px; margin: 0 auto; padding: 48px 20px; }
      .card { border: 1px solid #d1d5db; border-radius: 12px; padding: 20px; background: #fff; }
      .muted { color: #6b7280; }
      .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
      .btn { display: inline-block; padding: 10px 14px; border-radius: 8px; text-decoration: none; font-weight: 600; }
      .primary { background: #2563eb; color: #fff; }
      .secondary { border: 1px solid #d1d5db; color: #111827; }
      @media (prefers-color-scheme: dark) {
        body { background: #111827; color: #f3f4f6; }
        .card { background: #1f2937; border-color: #374151; }
        .muted { color: #9ca3af; }
        .secondary { color: #f3f4f6; border-color: #4b5563; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>✈️ Trip Planner Demo</h1>
      <div class="card">
        <p>
          This GitHub Pages site is automatically redeployed on each push to <code>main</code> by GitHub Actions.
        </p>
        <p class="muted">Latest deployed commit: <code>__COMMIT_SHA__</code></p>
        <p class="muted">Deployed at (UTC): <code>__DEPLOYED_AT__</code></p>
        <div class="actions">
          <a class="btn primary" href="https://github.com/nationalteam/trip-planner">View repository</a>
          <a class="btn secondary" href="https://github.com/nationalteam/trip-planner/actions/workflows/deploy-pages.yml">Deployment workflow</a>
        </div>
      </div>
    </main>
  </body>
</html>
